<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.11.1/p5.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.11.1/addons/p5.sound.min.js"></script>
    <link rel="stylesheet" type="text/css" href="style.css">
    <title>Cow Abductor — Physics Sim</title>
    <style>
      body { background:#0b0f14; color:#cfe9ff; font-family: -apple-system, system-ui, sans-serif; padding: 20px; }
      #sim-results { background:#111922; border:1px solid #2a3a4a; border-radius:8px; padding:16px; max-width:920px; white-space:pre-wrap; font-family: ui-monospace, Menlo, monospace; font-size:13px; line-height:1.45; }
      h1 { margin-top:0; font-size:18px; color:#9fd3ff; }
      .pending { color:#888; font-style:italic; }
      /* Hide the game's debug panel and slider — sim doesn't need them */
      #debug-panel, #debug-toggle, main canvas { display:none !important; }
      .p5Canvas { display:none !important; }
      input[type="range"] { display:none !important; }
    </style>
  </head>
  <body>
    <h1>Cow Abductor — Physics Simulations</h1>
    <div id="sim-results"><span class="pending">Running simulations…</span></div>

    <main></main>

    <script src="constants.js"></script>
    <script src="alien.js"></script>
    <script src="sound.js"></script>
    <script src="sketch.js"></script>
    <script src="lander.js"></script>
    <script src="cow.js"></script>
    <script src="planet.js"></script>
    <script src="base.js"></script>
    <script src="debug.js"></script>
    <script src="simulate.js"></script>
  </body>
</html>
